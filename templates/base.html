<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Internet Quality Analyzer - Collecte et analyse de la qualité internet au Cameroun">
    <title>{% block title %}Internet Quality Analyzer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">📡</span>
                <span class="logo-text">IQA</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" id="nav-speedtest">
                    <span class="nav-icon">⚡</span><span class="nav-label">Speed Test</span>
                </a>
                <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" id="nav-dashboard">
                    <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
                </a>
                <a href="/history" class="nav-link {% if request.path == '/history' %}active{% endif %}" id="nav-history">
                    <span class="nav-icon">📋</span><span class="nav-label">Historique</span>
                </a>
                <a href="/ranking" class="nav-link {% if request.path == '/ranking' %}active{% endif %}" id="nav-ranking">
                    <span class="nav-icon">🏆</span><span class="nav-label">Classement</span>
                </a>
                <a href="/admin" class="nav-link {% if request.path == '/admin' %}active{% endif %}" id="nav-admin">
                    <span class="nav-icon">⚙️</span><span class="nav-label">Admin</span>
                </a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Internet Quality Analyzer — Cameroun</p>
    </footer>

    <script>
    // Mobile nav toggle
    const toggle = document.getElementById('nav-toggle');
    const links = document.querySelector('.nav-links');
    if (toggle) {
        toggle.addEventListener('click', () => {
            links.classList.toggle('open');
            toggle.classList.toggle('active');
        });
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
